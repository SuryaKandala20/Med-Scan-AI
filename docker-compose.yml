version: "3.9"

services:
  backend:
    build: ./backend
    container_name: medscan-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # contains OPENAI_API_KEY etc — never committed
    volumes:
      - medscan_data:/app/data  # persist chromadb + audit DB between restarts
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: medscan-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  medscan_data:
